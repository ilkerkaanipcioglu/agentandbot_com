# Example internal tool registry for e-any.online.
# Copy to an ignored local file if needed, but keep credentials in a password manager or SOPS/age.
# Never put passwords, invite tokens, session cookies, API keys, or root credentials here.

domain: e-any.online
owner: Harezm internal operations
credential_store: "1Password / Bitwarden / KeePassXC / SOPS-age, not git"

tools:
  - slug: ai-webui
    name: Open WebUI
    url: https://ai.e-any.online/
    container: ai-webui
    category: ai_interface
    audience: [internal_team]
    agent_access: false
    status: active
    auth_mode: password_or_sso
    health: healthy
    data_classification: internal
    secrets_ref: vault://e-any/ai-webui/admin

  - slug: ai-ollama
    name: Ollama
    url: internal://ai-ollama:11434
    container: ai-ollama
    category: model_runtime
    audience: [agents, internal_team]
    agent_access: true
    status: active
    auth_mode: private_network
    health: running
    data_classification: internal
    secrets_ref: vault://e-any/ai-ollama/service-token

  - slug: paperclip
    name: Paperclip
    url: https://paperclip.e-any.online/
    container: ai-paperclip
    category: agent_runtime
    audience: [internal_team, agents]
    agent_access: true
    status: degraded
    auth_mode: password_or_invite
    health: restarting
    data_classification: internal
    secrets_ref: vault://e-any/paperclip/admin

  - slug: agent-zero
    name: Agent Zero
    url: https://a0.e-any.online/
    container: agent-zero
    category: agent_runtime
    audience: [internal_team, agents]
    agent_access: true
    status: active
    auth_mode: password_or_sso
    health: unknown
    data_classification: internal
    secrets_ref: vault://e-any/agent-zero/admin

  - slug: space-agent
    name: Space Agent
    url: https://space.e-any.online/
    container: space-agent
    category: agent_runtime
    audience: [internal_team, agents]
    agent_access: true
    status: active
    auth_mode: password_or_sso
    health: unknown
    data_classification: internal
    secrets_ref: vault://e-any/space-agent/admin

  - slug: siyuan
    name: SiYuan
    url: https://notes.e-any.online/
    internal_url: http://37.187.139.200:6806/
    container: siyuan-siyuan-1
    category: knowledge_base
    audience: [internal_team]
    agent_access: false
    status: active
    auth_mode: password_or_sso
    health: unknown
    data_classification: confidential
    secrets_ref: vault://e-any/siyuan/admin

  - slug: windmill
    name: Windmill
    url: https://windmill.e-any.online/
    container: windmill-server
    category: workflow_automation
    audience: [internal_team, agents]
    agent_access: true
    status: active
    auth_mode: sso_or_service_token
    health: running
    data_classification: internal
    allowed_agent_scopes: [workflow:run, job:read, mcp:invoke]
    secrets_ref: vault://e-any/windmill/admin

  - slug: activepieces
    name: Activepieces
    url: https://cloud.activepieces.com/
    container: activepieces-cloud
    category: workflow_automation
    audience: [internal_team, agents]
    agent_access: true
    status: active
    auth_mode: oauth_mcp
    health: managed_cloud
    data_classification: internal
    allowed_agent_scopes: [workflow:run, mcp:invoke, social:write, forms:read]
    secrets_ref: vault://e-any/activepieces/oauth

  - slug: portainer
    name: Portainer
    url: https://portainer.e-any.online/
    container: admin-portainer
    category: admin
    audience: [ops_admins]
    agent_access: false
    status: active
    auth_mode: sso_or_admin_password
    health: running
    data_classification: restricted
    secrets_ref: vault://e-any/portainer/admin

  - slug: uptime-kuma
    name: Uptime Kuma
    url: https://uptime.e-any.online/
    container: admin-uptime
    category: monitoring
    audience: [internal_team, ops_admins]
    agent_access: read_only
    status: active
    auth_mode: sso_or_password
    health: healthy
    data_classification: internal
    secrets_ref: vault://e-any/uptime-kuma/admin

  - slug: netdata
    name: Netdata
    url: https://netdata.e-any.online/
    container: admin-netdata
    category: monitoring
    audience: [ops_admins]
    agent_access: read_only
    status: active
    auth_mode: sso_or_password
    health: healthy
    data_classification: restricted
    secrets_ref: vault://e-any/netdata/admin

  - slug: nginx-proxy-manager
    name: Nginx Proxy Manager
    url: https://nginx-admin.e-any.online/
    internal_url: http://37.187.139.200:81/
    container: core-nginx
    category: edge_proxy
    audience: [ops_admins]
    agent_access: false
    status: active
    auth_mode: admin_password
    health: running
    data_classification: restricted
    secrets_ref: vault://e-any/nginx-proxy-manager/admin

  - slug: postgres
    name: PostgreSQL
    url: internal://core-postgres:5432
    container: core-postgres
    category: database
    audience: [ops_admins, apps]
    agent_access: scoped_service_accounts_only
    status: active
    auth_mode: service_account
    health: running
    data_classification: restricted
    secrets_ref: vault://e-any/postgres/admin

  - slug: redis
    name: Redis
    url: internal://core-redis:6379
    container: core-redis
    category: cache
    audience: [apps]
    agent_access: false
    status: active
    auth_mode: private_network
    health: running
    data_classification: internal
    secrets_ref: vault://e-any/redis/service-token
