name: Build and Push Governance Core

on:
  push:
    branches: [main]
    paths:
      - 'agentandbot_com/governance_core/**'
      - '.github/workflows/govcore.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentandbot_com/governance_core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone upstream governance_core
        run: |
          git clone --depth 1 https://github.com/agentandbot-design/agentandbot_com.git /tmp/govcore
          rm -rf agentandbot_com/governance_core
          mv /tmp/govcore agentandbot_com/governance_core

      - name: Fix repo adapter for CI
        run: |
          cat > config/runtime.exs << 'EOF'
          import Config

          config :governance_core, :repo_adapter,
            "#{System.get_env("DATABASE_URL", "")}"
            |> String.split(":")
            |> case do
              ["postgres" | "postgresql" | "ecto"] -> Ecto.Adapters.Postgres
              _ -> Ecto.Adapters.SQLite3
            end

          config :governance_core, :root_path, Path.expand("../..", __DIR__)

          secret_key_base =
            System.get_env("SECRET_KEY_BASE") ||
              "L3fNoe5A/bE/6XUJRJJGWTbkrvX5WiaOJaPhUmQ3jOFLsXUFwBwZl8aK8m/M+oQm"

          config :governance_core, GovernanceCoreWeb.Endpoint,
            url: [host: "localhost", port: 4000],
            secret_key_base: secret_key_base
          EOF

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27'

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Compile
        run: mix compile

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: agentandbot_com/governance_core
          file: docker/govcore/Dockerfile
          push: true
          tags: |
            ghcr.io/ilkerkaanipcioglu/governance-core:latest
            ghcr.io/ilkerkaanipcioglu/governance-core:${{ github.sha }}
          cache-from: |
            type=gha
            scope=${{ github.workflow }}
          cache-to: |
            type=gha
            mode=max
            path: |
              agentandbot_com/governance_core/_build
              agentandbot_com/governance_core/deps
